name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - run: cargo run -p write-eval

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  browser-extension:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Validate browser extension release package
        shell: pwsh
        run: .\scripts\validate-browser-extension-release.ps1
      - name: Export browser extension store submission bundle
        shell: pwsh
        run: .\scripts\export-browser-extension-store-submission.ps1 -SkipPreflight -ScreenshotRoot 'dist\browser-extension-store-assets\v0.7-extension-store-screenshots-20260623-030207' -AllowMissingScreenshots
      - name: Inspect browser extension store submission integrity
        shell: pwsh
        run: .\scripts\check-browser-extension-store-submission-integrity.ps1
      - name: Upload browser extension release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nahou-browser-extension-1.0.0.1-release-artifacts
          path: |
            dist/browser-extension/nahou-browser-extension-1.0.0.1.zip
            dist/browser-extension-store-submission/nahou-browser-extension-1.0.0.1-store-submission/**
          if-no-files-found: error
          retention-days: 14

  office-addins:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Validate Office add-ins foundation package
        shell: pwsh
        run: .\scripts\validate-office-addins-release.ps1
      - name: Upload Office add-ins foundation artifact
        uses: actions/upload-artifact@v6
        with:
          name: nahou-office-addins-1.0.0.1-foundation
          path: dist/office-addins/nahou-office-addins-1.0.0.1.zip
          if-no-files-found: error
          retention-days: 14

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies for mock LLM runtime
        working-directory: frontend
        run: npm ci
      - name: Smoke CLI
        shell: powershell
        run: .\scripts\smoke-cli.ps1
      - name: Smoke API
        shell: powershell
        run: .\scripts\smoke-api.ps1
      - name: LLM doctor
        run: cargo run -p write-cli -- llm doctor
      - name: Smoke mock local LLM
        shell: powershell
        run: .\scripts\smoke-llm.ps1 -MockRuntime

  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build Windows desktop installer
        working-directory: frontend
        run: npm run desktop:build
      - name: Verify desktop installer bundle
        shell: pwsh
        run: .\scripts\check-desktop-installer-bundle.ps1
      - name: Upload Windows desktop installer
        uses: actions/upload-artifact@v6
        with:
          name: nahou-desktop-windows-setup
          path: target/release/bundle/nsis/Nahou-*-windows-x64-setup.exe
          if-no-files-found: error
          retention-days: 14

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check licenses bans sources
